<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 260" role="img" aria-labelledby="title">
  <title id="title">GAMES ON VARA</title>
  <defs>
    <linearGradient id="letterFill" x1="100" y1="48" x2="1300" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b0764"/>
      <stop offset="0.28" stop-color="#581c87"/>
      <stop offset="0.56" stop-color="#1d4ed8"/>
      <stop offset="0.78" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glossFill" x1="700" y1="52" x2="700" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="0.23" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.72" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="edgeLight" x1="120" y1="36" x2="1280" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.5" stop-color="#bfdbfe"/>
      <stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
    <filter id="softGlow" x="-24%" y="-34%" width="148%" height="168%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="wideBlur"/>
      <feColorMatrix in="wideBlur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.08 0 0 0 0 0.62 0 0 0 0.64 0" result="violetGlow"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="blueBlur"/>
      <feColorMatrix in="blueBlur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.32 0 0 0 0 1 0 0 0 0.74 0" result="blueGlow"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="tightBlur"/>
      <feColorMatrix in="tightBlur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.95 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="violetGlow"/>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerLift" x="-8%" y="-12%" width="116%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="0" flood-color="#0f172a" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1e1b4b" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="1.2" flood-color="#ffffff" flood-opacity="0.62"/>
    </filter>
    <style>
      .logoText {
        font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Avenir Next", Arial, sans-serif;
        font-weight: 900;
        letter-spacing: 0;
        text-anchor: middle;
        paint-order: stroke fill;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <g filter="url(#softGlow)">
    <text class="logoText" x="710" y="172" font-size="150" fill="#0f172a" stroke="#0f172a" stroke-width="34" opacity="0.38">
      GAMES ON VARA
    </text>
    <text class="logoText" x="700" y="160" font-size="150" fill="url(#letterFill)" stroke="#111827" stroke-width="29">
      GAMES ON VARA
    </text>
  </g>

  <g filter="url(#innerLift)">
    <text class="logoText" x="700" y="160" font-size="150" fill="url(#letterFill)" stroke="url(#edgeLight)" stroke-width="8">
      GAMES ON VARA
    </text>
    <text class="logoText" x="700" y="160" font-size="150" fill="url(#glossFill)" stroke="none" opacity="0.58">
      GAMES ON VARA
    </text>
  </g>
</svg>
